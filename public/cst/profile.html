                        rRed: '#FF5A5A',
                        rOrange: '#FF8B5A',
                        rYellow: '#FFD45A',

    <style>

        body { font-family: 'Plus Jakarta Sans', sans-serif; }

            backdrop-filter: blur(10px);
            border-right: 1px solid #f1f5f9;
        }

        .nav-item.active {
            background: linear-gradient(to right, #FF5A5A, #FF8B5A);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(255, 90, 90, 0.3);
        }

        .input-focus:focus {
            border-color: #FF8B5A;
            box-shadow: 0 0 0 4px rgba(255, 139, 90, 0.1);
        }

</head>
<body class="bg-slate-50 min-h-screen flex text-slate-800">

    <aside class="hidden lg:flex flex-col w-72 glass-sidebar sticky top-0 h-screen p-8 z-40">
        <div class="mb-12">
            <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-rRed to-rOrange">
                RuangRestu
            </h1>
        </div>

        <nav class="flex-1 space-y-3">
            <a href="dashboard.html" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl font-semibold text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>

            <a href="manage-invitation.html" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl font-semibold text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Buat Undangan
            </a>
            <a href="blast.html" class="nav-item flex items-center gap-4 px-5 py-4 rounded-2xl font-semibold text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>

                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                Profil Saya

        <div class="mt-auto pt-10">
            <button class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold text-slate-400 hover:text-rRed hover:bg-rRed/5 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 w-full p-6 md:p-10 lg:p-12 pb-32 lg:pb-12 h-screen overflow-y-auto">
        <header class="mb-10">
            <h2 class="text-3xl font-extrabold text-slate-800">Pengaturan Profil</h2>
            <p class="text-slate-400 mt-1">Kelola informasi pribadi dan keamanan akun Anda.</p>
        </header>

        <div class="max-w-4xl space-y-8">
            <div class="bg-white p-8 md:p-10 rounded-[3rem] border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-12 h-12 bg-rOrange/10 text-rOrange rounded-2xl flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">Informasi Pribadi</h3>
                </div>

                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-600 ml-1">Nama Lengkap</label>
                            <input type="text" value="Muhammad Fauzan Aztera" 
                                class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none transition input-focus text-slate-700">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-600 ml-1">WhatsApp (Utama)</label>
                            <input type="tel" value="089515310917" 
                                class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none transition input-focus text-slate-700 font-medium">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600 ml-1">Email</label>
                        <input type="email" value="fauzan@dangdang.studio" disabled
                            class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-100 outline-none text-slate-400 cursor-not-allowed">
                        <p class="text-[10px] text-slate-400 ml-1 italic">* Email tidak dapat diubah karena terhubung dengan Google Auth.</p>
                    </div>

                    <button type="submit" class="px-8 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-rOrange transition-all shadow-lg shadow-slate-200 active:scale-95">
                        Simpan Perubahan
                    </button>
                </form>
            </div>

            <div class="bg-white p-8 md:p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-12 h-12 bg-rRed/10 text-rRed rounded-2xl flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800">Keamanan</h3>
                </div>

                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-600 ml-1">Password Baru</label>
                            <input type="password" placeholder="••••••••"
                                class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none transition input-focus">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-600 ml-1">Konfirmasi Password</label>
                            <input type="password" placeholder="••••••••"
                                class="w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50 outline-none transition input-focus">
                        </div>
                    </div>

                    <button type="submit" class="px-8 py-4 bg-white border-2 border-slate-200 text-slate-700 rounded-2xl font-bold hover:border-rRed hover:text-rRed transition-all active:scale-95">
                        Update Password
                    </button>
                </form>
            </div>
        </div>

        <footer class="hidden lg:block mt-16 pt-8 border-t border-slate-100 text-center text-slate-400 text-sm">
            &copy; 2026 RuangRestu.com • Profil Anda dijamin aman.
        </footer>
    </main>

    <nav class="lg:hidden fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-xl border border-slate-100 rounded-[2.5rem] p-4 flex justify-between items-center z-50 shadow-2xl shadow-slate-900/10">

    </nav>
