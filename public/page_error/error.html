<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Tidak Ditemukan | RuangRestu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rRed: '#FF5A5A',
                        rOrange: '#FF8B5A',
                        rYellow: '#FFD45A',
                        rLightOrange: '#FFA35A',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(20px, -30px) scale(1.05)' },
                            '66%': { transform: 'translate(-15px, 15px) scale(0.95)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .glow-btn:hover {
            box-shadow: 0 10px 25px rgba(255, 90, 90, 0.25);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div
            class="absolute top-10 left-10 w-48 h-48 md:w-80 md:h-80 bg-rLightOrange rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob">
        </div>
        <div
            class="absolute bottom-10 right-10 w-64 h-64 md:w-96 md:h-96 bg-rRed rounded-full mix-blend-multiply filter blur-3xl opacity-15 animate-blob animation-delay-2000">
        </div>
    </div>

    <main class="relative z-10 w-full max-w-xl mx-auto">
        <div
            class="glass-light p-8 md:p-16 rounded-[2.5rem] md:rounded-[3.5rem] shadow-xl text-center border-2 border-white/50">

            <div class="relative mb-6 md:mb-10 flex justify-center items-center">
                <span class="text-8xl md:text-9xl font-black text-slate-100/80 leading-none select-none">
                    404
                </span>
                <div class="absolute inset-0 flex items-center justify-center">
                    <span
                        class="text-4xl md:text-6xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-rRed via-rOrange to-rYellow">
                        Waduh!
                    </span>
                </div>
            </div>

            <h1 class="text-xl md:text-2xl font-bold text-slate-800 mb-3 md:mb-4 px-2">
                Halaman Tidak Ditemukan
            </h1>

            <p
                class="text-slate-500 text-sm md:text-base mb-8 md:mb-12 leading-relaxed max-w-xs md:max-w-md mx-auto px-2">
                Sepertinya link undangan ini salah atau sudah tidak aktif lagi. Mari kembali ke halaman utama.
            </p>

            <div class="flex flex-col sm:flex-row gap-3 md:gap-4 justify-center">
                <a href="/"
                    class="order-1 sm:order-2 bg-gradient-to-r from-rRed to-rOrange text-white px-8 py-4 rounded-2xl md:rounded-full font-bold text-base md:text-lg glow-btn transition-all hover:scale-105 active:scale-95 text-center shadow-lg shadow-rRed/20">
                    Ke Beranda
                </a>
                <a href="javascript:history.back()"
                    class="order-2 sm:order-1 bg-white text-slate-600 border border-slate-200 px-8 py-4 rounded-2xl md:rounded-full font-semibold text-base md:text-lg hover:bg-slate-50 transition-all text-center">
                    Kembali
                </a>
            </div>

            <div class="mt-10 md:mt-14 pt-6 md:pt-8 border-t border-slate-100">
                <p class="text-[10px] md:text-xs text-slate-400 uppercase tracking-[0.2em] mb-2 font-medium">Powered by
                </p>
                <a href="https://instagram.com/ruangrestu.undangan" target="_blank" rel="noopener noreferrer"
                    class="inline-block group transition-transform hover:scale-105 active:scale-95">
                    <span
                        class="text-xl md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-rRed via-rOrange to-rYellow group-hover:from-rOrange group-hover:to-rRed transition-all duration-500">
                        RuangRestu
                    </span>
                </a>
            </div>
        </div>
    </main>

</body>

</html>
